services:
  postgres:
    image: postgres:16-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medusa-store"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medusa_network

  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medusa_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: medusa_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/medusa-store
      REDIS_URL: redis://redis:6379
      ADMIN_CORS: http://localhost:5173,http://localhost:9000,http://localhost:8000
      STORE_CORS: http://localhost:8000,http://localhost:3000
      AUTH_CORS: http://localhost:8000,http://localhost:3000
      JWT_SECRET: supersecret_jwt_2024
      COOKIE_SECRET: supersecret_cookie_2024
    env_file:
      - apps/backend/.env
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - medusa_network

  storefront:
    build:
      context: ./apps/storefront
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://backend:9000
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_9c91d51e348d0620304926094ac6145467f36ba6b180b4a75b50b095e3797dea
        NEXT_PUBLIC_DEFAULT_REGION: in
        NEXT_PUBLIC_BASE_URL: http://localhost:8000
    container_name: medusa_storefront
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8000:8000"
    environment:
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://backend:9000
      NEXT_PUBLIC_DEFAULT_REGION: in
      NEXT_PUBLIC_BASE_URL: http://localhost:8000
    env_file:
      - apps/storefront/.env
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - medusa_network

  nginx:
    image: nginx:1.25-alpine
    container_name: medusa_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/sites:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
      - storefront
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - medusa_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  nginx_cache:
    driver: local

networks:
  medusa_network:
    driver: bridge
